<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Linktrail</title>
    <link rel="stylesheet" href="src/popup.css" />
  </head>
  <!-- The controller (popup.ts) swaps this body class through the six states:
       state-ready | state-saving | state-saved | state-duplicate |
       state-failed | state-not-capturable. All visual states are CSS-only. -->
  <body class="state-ready">
    <main class="popup">
      <section class="page-card">
        <span class="favicon-tile">
          <img id="favicon" class="favicon" src="" alt="" />
        </span>
        <div class="page-meta">
          <p id="title" class="title"></p>
          <p id="url-preview" class="url-preview"></p>
          <!-- Subtle "already saved on open" hint; revealed by popup.ts when the
               status check confirms the current tab is already in the trail. -->
          <p id="saved-hint" class="saved-hint" hidden>Already in your trail</p>
        </div>
      </section>

      <button id="save-btn" type="button" class="save-btn">
        <svg class="save-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7 4h10a1 1 0 0 1 1 1v15l-6-4-6 4V5a1 1 0 0 1 1-1z" />
        </svg>
        <span class="save-label">Save page</span>
      </button>

      <!-- Text set by the controller; visibility/colour driven by body state. -->
      <div id="result-strip" class="result-strip" role="status" aria-live="polite"></div>

      <!-- Local, backend-free action: extract the page's main article to Markdown,
           copy it, and download a .md. Glass (not amber) so the warm Save button
           stays the single primary action. Its label doubles as inline feedback. -->
      <button id="export-btn" type="button" class="export-btn">
        <svg class="export-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 3v10m0 0 4-4m-4 4-4-4M5 17v2a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span id="export-label" class="export-label">Export as Markdown</span>
      </button>

      <div class="chips">
        <button id="open-feed" type="button" class="chip">Feed</button>
        <button id="open-history" type="button" class="chip">History</button>
        <button id="open-settings" type="button" class="chip">Settings</button>
      </div>

      <div class="brand-row">
        <span class="brand">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 4h10a1 1 0 0 1 1 1v15l-6-4-6 4V5a1 1 0 0 1 1-1z" /></svg>
          Linktrail
        </span>
      </div>
    </main>

    <script type="module" src="src/popup.ts"></script>
  </body>
</html>
