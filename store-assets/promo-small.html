<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><style>
  :root{--grA:#45454b;--grB:#1b1b1f;--a1:#ffc062;--a2:#ff9f0a;--ink:#2a1c02;
    --f:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",system-ui,sans-serif;}
  *{box-sizing:border-box;} html,body{margin:0;width:440px;height:280px;overflow:hidden;}
  body{font-family:var(--f);color:#fff;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:18px;text-align:center;padding:0 32px;
    background:radial-gradient(80% 70% at 18% -10%,rgba(255,244,230,.14),transparent 55%),linear-gradient(165deg,var(--grA),var(--grB) 64%);}
  .mark{width:72px;height:72px;border-radius:19px;display:grid;place-items:center;background:linear-gradient(180deg,var(--a1),var(--a2));
    box-shadow:inset 0 1px 0 rgba(255,255,255,.6),0 14px 30px -12px rgba(255,159,10,.7);}
  .mark svg{width:38px;height:38px;fill:var(--ink);}
  h1{margin:0;font-size:34px;font-weight:700;letter-spacing:-.02em;}
  p{margin:0;font-size:16px;color:rgba(255,255,255,.82);}
  p .am{color:#ffb84d;font-weight:600;}
</style></head><body>
  <div class="mark"><svg viewBox="0 0 24 24"><path d="M7 4h10a1 1 0 0 1 1 1v15l-6-4-6 4V5a1 1 0 0 1 1-1z"/></svg></div>
  <h1>Linktrail</h1>
  <p>Flag a page in a keystroke. <span class="am">Read it in your own RSS.</span></p>
</body></html>
